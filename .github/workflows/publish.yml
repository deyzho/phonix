name: Test & Publish to npm

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Audit production dependencies (critical only)
        run: npm audit --production --audit-level=critical

      - name: Type check (SDK)
        working-directory: packages/sdk
        run: npx tsc --noEmit

      - name: Build SDK
        working-directory: packages/sdk
        run: npm run build

      - name: Run SDK tests
        working-directory: packages/sdk
        run: npm test

      - name: Run inference tests
        working-directory: packages/inference
        run: npm test

      - name: Run mobile tests
        working-directory: packages/mobile
        run: npm test

      - name: Run CLI tests
        working-directory: packages/cli
        run: npm test

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  publish:
    name: Build & Publish
    needs: [test, sbom]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Build SDK
        working-directory: packages/sdk
        run: npm run build

      - name: Publish @axonsdk/sdk
        working-directory: packages/sdk
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build Inference
        working-directory: packages/inference
        run: npm run build

      - name: Publish @axonsdk/inference
        working-directory: packages/inference
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Typecheck Mobile
        working-directory: packages/mobile
        run: npm run typecheck

      - name: Build Mobile
        working-directory: packages/mobile
        run: npm run build

      - name: Publish @axonsdk/mobile
        working-directory: packages/mobile
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install CLI dependencies
        working-directory: packages/cli
        run: npm install --legacy-peer-deps

      - name: Build CLI
        working-directory: packages/cli
        run: npm run build

      - name: Publish @axonsdk/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
